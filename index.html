<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cold | Starry Flow</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
background:black;
font-family:'Inter',sans-serif;
color:white;
padding:40px 0;
}

.bg{
position:fixed;
inset:0;
background:radial-gradient(circle at top,#09152f 0%,#020202 50%,#000 100%);
overflow:hidden;
z-index:0;
}

.penta{
position:absolute;
color:white;
opacity:.2;
animation:fall linear infinite;
text-shadow:0 0 12px rgba(255,255,255,.8);
}

@keyframes fall{
0%{transform:translateY(-120px) rotate(0deg);}
100%{transform:translateY(120vh) rotate(360deg);}
}

.wrap{
position:relative;
z-index:5;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0 100px;
}

.card{
position:relative;
width:350px;
padding:28px 28px 55px;
border-radius:30px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
box-shadow:
0 0 25px rgba(255,255,255,.05),
inset 0 0 20px rgba(255,255,255,.03);
overflow:hidden;
}

.blur-layer{
position:absolute;
inset:0;
pointer-events:none;
}

.blur-penta{
position:absolute;
color:white;
opacity:.22;
filter:blur(3px);
transform:scale(1.9);
animation:fall linear infinite;
}

.avatar{
width:145px;
height:145px;
border-radius:34px;
display:block;
margin:auto;
object-fit:cover;
}

.nick{
font-family:'Orbitron',sans-serif;
font-size:50px;
text-align:center;
margin-top:22px;
letter-spacing:7px;
text-shadow:0 0 18px rgba(255,255,255,.3);
}

.sub{
text-align:center;
margin-top:10px;
opacity:.72;
}

.links{
margin-top:28px;
display:flex;
flex-direction:column;
gap:14px;
}

.btn{
position:relative;
overflow:hidden;
display:block;
text-align:center;
text-decoration:none;
color:white;
padding:17px;
border-radius:24px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.13);
backdrop-filter:blur(14px);
transition:.22s ease;
}

.btn::before{
content:'';
position:absolute;
inset:0;
border-radius:24px;
padding:1px;
background:linear-gradient(120deg,
rgba(255,255,255,.9),
transparent,
rgba(255,255,255,.9));
-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
animation:shine 3s linear infinite;
}

@keyframes shine{
0%{transform:translateX(-100%)}
100%{transform:translateX(100%)}
}

.btn:hover{transform:scale(1.03);}
.btn:active{transform:scale(1.08);}

.stats{
display:flex;
justify-content:center;
gap:16px;
margin-top:22px;
}

.stat{
padding:10px 18px;
border-radius:18px;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(10px);
}

.quote{
margin-top:30px;
font-size:14px;
line-height:1.8;
text-align:center;
opacity:.82;
padding-bottom:10px;
}

.enter{
position:fixed;
inset:0;
z-index:99;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.82);
backdrop-filter:blur(10px);
transition:1s ease;
}

.enter.hidden{
opacity:0;
pointer-events:none;
}

.enter-btn{
padding:20px 58px;
border-radius:30px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
font-size:18px;
letter-spacing:5px;
text-transform:uppercase;
backdrop-filter:blur(15px);
transition:.25s ease;
cursor:pointer;
}

.enter-btn:active{
transform:scale(1.1);
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="enter" id="enter">
<div class="enter-btn" onclick="openSite()">перейти</div>
</div>

<div class="wrap">
<div class="card">

<div class="blur-layer" id="blurLayer"></div>

<img src="avatar.jpg" class="avatar">

<div class="nick">cold</div>

<div class="sub">I wish you all good luck</div>

<div class="links">
<a class="btn" href="https://t.me/coId_1337" target="_blank">TELEGRAM</a>
<a class="btn" href="https://discord.com/users/co1d_1337" target="_blank">DISCORD</a>
<a class="btn" href="https://t.me/starscold_bot" target="_blank">ДЕШЁВЫЕ ЗВЁЗДЫ</a>
<div class="btn" id="likeBtn">❤️ ЛАЙК</div>
</div>

<div class="stats">
<div class="stat">👁 <span id="views">0</span></div>
<div class="stat">❤️ <span id="likes">0</span></div>
</div>

<div class="quote">
«Полюби безразличие, и оно исцелит твои раны,<br>
даруя свободу от страданий.»
</div>


<div style="
text-align:center;
margin-top:22px;
opacity:.45;
font-size:12px;
letter-spacing:1px;
">
все права защищены trapcold ⛧
</div>

</div>
</div>

<audio id="music" src="music.mp3" loop></audio>

<script>
const bg = document.getElementById('bg');
const blurLayer = document.getElementById('blurLayer');

for(let i=0;i<85;i++){
const p=document.createElement('div');
p.className='penta';
p.innerHTML='⛧';
p.style.left=Math.random()*100+'vw';
p.style.fontSize=(Math.random()*24+12)+'px';
p.style.animationDuration=(Math.random()*10+8)+'s';
p.style.animationDelay=Math.random()*10+'s';
bg.appendChild(p);
}

for(let i=0;i<30;i++){
const p=document.createElement('div');
p.className='blur-penta';
p.innerHTML='⛧';
p.style.left=Math.random()*100+'%';
p.style.fontSize=(Math.random()*24+14)+'px';
p.style.animationDuration=(Math.random()*10+8)+'s';
p.style.animationDelay=Math.random()*10+'s';
blurLayer.appendChild(p);
}

let views = localStorage.getItem('views');
views = views ? parseInt(views)+1 : 1;
localStorage.setItem('views',views);
document.getElementById('views').textContent = views;

let likes = localStorage.getItem('likes_count') || 0;
document.getElementById('likes').textContent = likes;

const likeBtn = document.getElementById('likeBtn');

if(localStorage.getItem('liked')){
likeBtn.style.opacity='.5';
likeBtn.innerHTML='❤️ ЛАЙК ПОСТАВЛЕН';
}

likeBtn.addEventListener('click',()=>{
if(localStorage.getItem('liked')) return;

likes++;
localStorage.setItem('likes_count',likes);
localStorage.setItem('liked','true');

document.getElementById('likes').textContent = likes;
likeBtn.style.opacity='.5';
likeBtn.innerHTML='❤️ ЛАЙК ПОСТАВЛЕН';
});

function openSite(){
document.getElementById('enter').classList.add('hidden');

const music=document.getElementById('music');
music.volume=.4;
music.play().catch(()=>{});
}
</script>

</body>
</html>
