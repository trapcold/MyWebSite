<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>cold | Starry Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- ГЛАВНЫЙ ФОН --- */
        .background-wrap {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at bottom, #0a1631 0%, #000 100%);
        }

        /* Анимации звезд */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        @keyframes fall {
            0% { transform: translate(0, -10vh); }
            100% { transform: translate(-150px, 110vh); }
        }

        /* --- КОНТЕЙНЕР КАРТОЧКИ --- */
        .glass-card-container {
            position: relative;
            z-index: 100;
            opacity: 0; transform: translateY(20px);
            transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .loaded .glass-card-container { opacity: 1; transform: translateY(0); }

        .glass-card {
            position: relative;
            width: 320px;
            padding: 50px 35px;
            text-align: center;
            border-radius: 45px;
            /* Стеклянный эффект */
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; 
        }

        /* КОНТЕЙНЕРЫ ДЛЯ ЗВЕЗД (Фон и Внутри) */
        #sky, .card-stars-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        /* СТИЛЬ ОБЫЧНОЙ ЗВЕЗДЫ */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--t-dur) infinite ease-in-out, fall var(--f-dur) infinite linear;
        }

        /* СТИЛЬ ЗВЕЗДЫ-ЛИНЗЫ (Внутри рамки) */
        .inner-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            /* Увеличение и свечение */
            filter: blur(0.3px) drop-shadow(0 0 5px rgba(255,255,255,1));
            animation: fall var(--f-dur) infinite linear;
        }

        /* --- КОНТЕНТ --- */
        .avatar {
            width: 140px; height: 140px; border-radius: 35px;
            object-fit: cover; margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; z-index: 10;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3rem; margin: 0; font-weight: 100;
            letter-spacing: 6px; color: #fff;
            position: relative; z-index: 10;
        }

        .sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem; margin: 15px 0 35px 0;
            position: relative; z-index: 10;
        }

        .links { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 10; }
        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; color: #fff;
            text-decoration: none; padding: 18px;
            font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
        }

        #enter-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.8s;
        }
    </style>
</head>
<body id="b">

    <div class="background-wrap" id="sky"></div>

    <div id="enter-overlay" onclick="start()">
        <div style="color: white; letter-spacing: 4px; border: 1px solid #444; padding: 15px 35px; border-radius: 50px;">ENTER</div>
    </div>

    <audio id="audio" src="music.mp3" loop></audio>

    <div class="glass-card-container">
        <div class="glass-card">
            <div class="card-stars-overlay" id="inner-sky"></div>
            <img src="avatar.jpg" class="avatar">
            <h1>cold</h1>
            <div class="sub">I wish you all good luck</div>
            <div class="links">
                <a href="https://t.me/coId_1337" target="_blank" class="btn">Telegram</a>
                <a href="https://discord.com/users/co1d_1337" target="_blank" class="btn">Discord</a>
            </div>
        </div>
    </div>

    <script>
        function createStars() {
            const sky = document.getElementById('sky');
            const innerSky = document.getElementById('inner-sky');
            const card = document.querySelector('.glass-card');
            
            const count = 150; // Оптимальное количество для плавности

            // Получаем координаты карточки для синхронизации
            const cardRect = card.getBoundingClientRect();

            for (let i = 0; i < count; i++) {
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const fDur = Math.random() * 12 + 8 + 's'; // Скорость падения
                const delay = Math.random() * 10 + 's';
                const size = Math.random() * 2 + 1 + 'px';

                // 1. Внешняя звезда (на фоне)
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = x + 'vw';
                star.style.top = y + 'vh';
                star.style.width = size;
                star.style.height = size;
                star.style.setProperty('--t-dur', Math.random() * 3 + 2 + 's');
                star.style.setProperty('--f-dur', fDur);
                star.style.animationDelay = delay;
                sky.appendChild(star);

                // 2. Внутренняя звезда (эффект линзы)
                const innerStar = document.createElement('div');
                innerStar.className = 'inner-star';
                
                // Рассчитываем позицию относительно карточки
                // Мы вычитаем отступы карточки, чтобы звезды совпадали по траектории
                innerStar.style.left = `calc(${x}vw - ${cardRect.left}px)`;
                innerStar.style.top = `calc(${y}vh - ${cardRect.top}px)`;
                
                // Увеличиваем размер в 2 раза для эффекта линзы
                const innerSize = (parseFloat(size) * 2) + 'px';
                innerStar.style.width = innerSize;
                innerStar.style.height = innerSize;
                
                innerStar.style.setProperty('--f-dur', fDur);
                innerStar.style.animationDelay = delay;
                innerSky.appendChild(innerStar);
            }
        }

        // Запуск после загрузки
        window.addEventListener('load', createStars);

        function start() {
            document.getElementById('enter-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('enter-overlay').style.display = 'none', 800);
            document.getElementById('b').classList.add('loaded');
            const audio = document.getElementById('audio');
            audio.play().catch(() => {});
            audio.volume = 0.4;
        }
    </script>
</body>
</html>
